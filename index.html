<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Install Tampermonkey</title>
  <meta name="description" content="Choose the correct Tampermonkey install page for your browser." />
  <style>
    :root {
      color-scheme: light;
    }
    body {
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f6f8fb;
      color: #1f2937;
    }
    .card {
      max-width: 720px;
      margin: 24px;
      padding: 28px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 28px;
    }
    p {
      line-height: 1.6;
      margin: 10px 0;
    }
    .status {
      margin-top: 16px;
      padding: 14px 16px;
      background: #f3f4f6;
      border-radius: 10px;
      font-size: 15px;
      color: #374151;
      word-break: break-word;
    }
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }
    a.button {
      display: inline-block;
      padding: 12px 16px;
      border-radius: 10px;
      text-decoration: none;
      color: white;
      background: #2563eb;
      font-weight: 600;
    }
    a.button.secondary {
      background: #4b5563;
    }
    .small {
      font-size: 13px;
      color: #6b7280;
      margin-top: 16px;
    }
    code {
      background: #eef2ff;
      padding: 2px 6px;
      border-radius: 6px;
    }
    .countdown {
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Install Tampermonkey</h1>
    <p>This page will suggest the best install path for your browser, but it will not force you away immediately.</p>

    <div class="status" id="status">
      Detecting browser…
    </div>

    <div class="links">
      <a class="button" id="installLink" href="https://www.tampermonkey.net/" rel="noopener noreferrer">Open install page</a>
      <a class="button secondary" href="https://www.tampermonkey.net/" rel="noopener noreferrer">Tampermonkey home</a>
    </div>

    <p class="small">
      If the browser is blocked or misdetected, use the button above. The page will try a redirect after a short delay.
    </p>
  </main>

  <script>
    (function () {
      const ua = navigator.userAgent || "";
      const status = document.getElementById("status");
      const installLink = document.getElementById("installLink");

      const pages = {
        firefox: "https://addons.mozilla.org/firefox/addon/tampermonkey/",
        edge: "https://microsoftedge.microsoft.com/addons/detail/tampermonkey/iikmkjmpaadaobahmlepeloendndfphd",
        chrome: "https://chromewebstore.google.com/detail/tampermonkey/dhdgffkkebhmkfjojejmpbldmpobfkfo",
        safari: "https://www.tampermonkey.net/?browser=safari",
        default: "https://www.tampermonkey.net/"
      };

      let browserName = "your browser";
      let url = pages.default;

      if (/Firefox/i.test(ua)) {
        browserName = "Firefox";
        url = pages.firefox;
      } else if (/Edg/i.test(ua)) {
        browserName = "Microsoft Edge";
        url = pages.edge;
      } else if (/OPR|Opera/i.test(ua)) {
        browserName = "Opera";
        url = pages.default;
      } else if (/Chrome/i.test(ua) && !/Edg|OPR/i.test(ua)) {
        browserName = "Chrome";
        url = pages.chrome;
      } else if (/Safari/i.test(ua) && !/Chrome/i.test(ua)) {
        browserName = "Safari";
        url = pages.safari;
      }

      installLink.href = url;

      // Keep the page visible and wait before redirecting.
      const delaySeconds = 5;
      let remaining = delaySeconds;

      status.innerHTML =
        "Detected <strong>" + browserName + "</strong>. Redirecting in " +
        "<span class='countdown' id='countdown'>" + remaining + "</span> seconds.";

      const countdownEl = document.getElementById("countdown");

      const timer = setInterval(function () {
        remaining -= 1;
        if (remaining <= 0) {
          clearInterval(timer);
          status.textContent = "Redirecting now.";
          window.location.href = url;
          return;
        }
        countdownEl.textContent = String(remaining);
      }, 1000);

      // Fallback for browsers that block or ignore timer-based redirects.
      setTimeout(function () {
        if (window.location.href !== url) {
          window.location.href = url;
        }
      }, delaySeconds * 1000);
    })();
  </script>
</body>
</html>
